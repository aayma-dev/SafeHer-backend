version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: safeher_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: safeher_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: safeher_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@postgres:5432/safeher_db
      SECRET_KEY: your-super-secret-key-change-this-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEBUG: "True"
      APP_NAME: SafeHer
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data: